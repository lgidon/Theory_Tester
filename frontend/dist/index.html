<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לימוד תאוריה - C1</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .question-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 16px;
            border-radius: 8px;
        }
        h2 { color: #1f2937; margin-bottom: 20px; font-size: 1.3rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            text-align: right;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn:hover:not(:disabled) { background: #f3f4f6; border-color: #d1d5db; }
        .correct { background: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; font-weight: bold; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .actions { display: flex; gap: 12px; margin-top: 20px; }
        .action-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;
        }
        .next-btn { background: #2563eb; color: white; }
        .known-btn { background: #059669; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div id="quiz-box">
            <img id="q-img" class="question-img" style="display: none;" src="" alt="תמרור / איור">
            <h2 id="q-text">טוען שאלה...</h2>
            <div id="answers-box"></div>
            <div class="actions">
                <button class="action-btn known-btn" onclick="markAsKnown()">יודע בוודאות, אל תראה שוב</button>
                <button class="action-btn next-btn" id="next-button" style="visibility: hidden;" onclick="loadQuestion()">שאלה הבאה ←</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestion = null;
        let answered = false;

        async function loadQuestion() {
            answered = false;
            document.getElementById('next-button').style.visibility = 'hidden';
            
            const res = await fetch('/api/question');
            if (res.status === 404) {
                document.getElementById('quiz-box').innerHTML = '<h2>🎉 כל הכבוד! ענית על כל השאלות במאגר!</h2>';
                return;
            }
            
            currentQuestion = await res.json();
            
            // Set Text
            document.getElementById('q-text').innerText = currentQuestion.Text;
            
            // Set Image
            const imgElement = document.getElementById('q-img');
            if (currentQuestion.ImageURL) {
                imgElement.src = '/images/' + currentQuestion.ImageURL;
                imgElement.style.display = 'block';
            } else {
                imgElement.style.display = 'none';
            }

            // Render Answers
            const box = document.getElementById('answers-box');
            box.innerHTML = '';
            currentQuestion.Answers.forEach((ans, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ans;
                btn.onclick = () => handleAnswer(index + 1, btn);
                box.appendChild(btn);
            });
        }

        async function handleAnswer(choice, selectedBtn) {
            if (answered) return;
            answered = true;

            const isCorrect = choice === currentQuestion.CorrectAnswer;
            
            // Report to Backend
            await fetch('/api/question/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentQuestion.ID, correct: isCorrect })
            });

            // Color-code the interface buttons
            const buttons = document.getElementById('answers-box').children;
            if (isCorrect) {
                selectedBtn.classList.add('correct');
            } else {
                selectedBtn.classList.add('wrong');
                buttons[currentQuestion.CorrectAnswer - 1].classList.add('correct');
            }

            document.getElementById('next-button').style.visibility = 'visible';
        }

        async function markAsKnown() {
            if (!currentQuestion) return;
            await fetch('/api/question/mark-known', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentQuestion.ID })
            });
            loadQuestion();
        }

        // Run on mount
        loadQuestion();
    </script>
</body>
</html>
