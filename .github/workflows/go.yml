name: Go Test and Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Test and Cross-Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Match your go.mod Go version
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

      - name: Compile for Linux (amd64)
        run: |
          mkdir -p dist
          env GOOS=linux GOARCH=amd64 go build -v -o dist/theory-app-linux-amd64 .

      - name: Compile for Windows (amd64)
        run: |
          env GOOS=windows GOARCH=amd64 go build -v -o dist/theory-app-windows-amd64.exe .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          path: dist/
          retention-days: 5
